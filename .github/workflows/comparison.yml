name: Comparison Benchmarks

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags
  workflow_dispatch:  # Allow manual triggering

jobs:
  benchmark:
    name: Run Comparison Benchmarks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-bench-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Install ripgrep
        run: |
          curl -LO https://github.com/BurntSushi/ripgrep/releases/download/14.1.1/ripgrep_14.1.1-1_amd64.deb
          sudo dpkg -i ripgrep_14.1.1-1_amd64.deb
          rg --version

      - name: Build finder in release mode
        run: cargo build --release

      - name: Run comparison benchmarks
        run: cargo bench --bench comparison_benchmarks

      - name: Extract benchmark metrics
        id: metrics
        run: |
          # Extract version from tag or use "dev" for manual runs
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="dev-$(date +%Y%m%d-%H%M%S)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

          # Parse Criterion output for summary metrics
          # Note: Detailed results are in target/criterion/
          echo "Benchmark completed for version $VERSION"

      - name: Checkout gh-pages branch
        id: checkout-gh-pages
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-deploy

      - name: Initialize gh-pages if needed
        run: |
          if [ ! -d "gh-pages-deploy" ] || [ ! -d "gh-pages-deploy/.git" ]; then
            echo "Creating new gh-pages branch..."
            rm -rf gh-pages-deploy
            mkdir -p gh-pages-deploy
            cd gh-pages-deploy
            git init
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -b gh-pages
            echo "# FindeRS Benchmarks" > README.md
            git add README.md
            git commit -m "Initialize gh-pages branch"
          fi

      - name: Update benchmark history
        run: |
          cd gh-pages-deploy

          # Create history.json if it doesn't exist
          if [ ! -f history.json ]; then
            echo "[]" > history.json
          fi

          # Append new entry to history
          VERSION="${{ steps.metrics.outputs.version }}"
          DATE="${{ steps.metrics.outputs.date }}"
          TIMESTAMP="${{ steps.metrics.outputs.timestamp }}"

          # Read existing history, append new entry, write back
          jq --arg ver "$VERSION" --arg date "$DATE" --arg ts "$TIMESTAMP" \
            '. += [{version: $ver, date: $date, timestamp: $ts, url: "./latest/report/index.html"}]' \
            history.json > history_tmp.json
          mv history_tmp.json history.json

      - name: Copy Criterion HTML reports
        run: |
          # Remove old latest/ directory
          rm -rf gh-pages-deploy/latest

          # Copy new Criterion HTML output
          mkdir -p gh-pages-deploy/latest
          cp -r target/criterion/* gh-pages-deploy/latest/ || echo "No criterion output found"

      - name: Generate index page
        run: |
          cd gh-pages-deploy

          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>FindeRS Comparison Benchmarks</title>
              <style>
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
                      max-width: 1200px;
                      margin: 0 auto;
                      padding: 2rem;
                      line-height: 1.6;
                      color: #333;
                  }
                  h1 {
                      border-bottom: 3px solid #0066cc;
                      padding-bottom: 0.5rem;
                  }
                  h2 {
                      margin-top: 2rem;
                      color: #0066cc;
                  }
                  table {
                      width: 100%;
                      border-collapse: collapse;
                      margin: 1rem 0;
                  }
                  th, td {
                      padding: 0.75rem;
                      text-align: left;
                      border-bottom: 1px solid #ddd;
                  }
                  th {
                      background-color: #f5f5f5;
                      font-weight: 600;
                  }
                  tr:hover {
                      background-color: #f9f9f9;
                  }
                  a {
                      color: #0066cc;
                      text-decoration: none;
                  }
                  a:hover {
                      text-decoration: underline;
                  }
                  .latest {
                      background-color: #e6f2ff;
                      padding: 1rem;
                      border-radius: 4px;
                      margin: 1rem 0;
                  }
                  code {
                      background-color: #f5f5f5;
                      padding: 0.2rem 0.4rem;
                      border-radius: 3px;
                      font-family: "Courier New", monospace;
                  }
                  .footer {
                      margin-top: 3rem;
                      padding-top: 1rem;
                      border-top: 1px solid #ddd;
                      color: #666;
                      font-size: 0.9rem;
                  }
              </style>
          </head>
          <body>
              <h1>🔍 FindeRS Comparison Benchmarks</h1>

              <p>
                  Performance comparisons of <code>finder</code> against <code>find+grep</code>
                  and <code>ripgrep</code> across different repository sizes and search patterns.
              </p>

              <div class="latest">
                  <h2>Latest Results</h2>
                  <p><a href="./latest/report/index.html">View detailed Criterion benchmark reports →</a></p>
              </div>

              <h2>Benchmark History</h2>
              <table id="history-table">
                  <thead>
                      <tr>
                          <th>Version</th>
                          <th>Date</th>
                          <th>Results</th>
                      </tr>
                  </thead>
                  <tbody id="history-body">
                      <tr><td colspan="3">Loading...</td></tr>
                  </tbody>
              </table>

              <h2>About These Benchmarks</h2>
              <p>
                  Benchmarks test 6 scenarios: 3 repository sizes (small ~100 files, medium ~1K files,
                  large ~10K files) × 2 search patterns (common pattern found in ~50% of files,
                  rare pattern in 1 file).
              </p>
              <p>
                  All tools search for patterns in <code>*.rs</code> files using equivalent commands:
              </p>
              <ul>
                  <li><code>find</code> + <code>grep</code>: Traditional Unix pipeline</li>
                  <li><code>ripgrep</code>: Modern fast searcher</li>
                  <li><code>finder</code>: This project's implementation</li>
              </ul>

              <div class="footer">
                  <p>Generated automatically on benchmark runs. <a href="https://github.com/ydkadri/finders">View repository →</a></p>
              </div>

              <script>
                  // Load and display history
                  fetch('history.json')
                      .then(response => response.json())
                      .then(data => {
                          const tbody = document.getElementById('history-body');
                          tbody.innerHTML = '';

                          // Sort by timestamp descending (most recent first)
                          data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

                          if (data.length === 0) {
                              tbody.innerHTML = '<tr><td colspan="3">No benchmark history yet.</td></tr>';
                              return;
                          }

                          data.forEach(entry => {
                              const row = document.createElement('tr');
                              row.innerHTML = `
                                  <td><code>${entry.version}</code></td>
                                  <td>${entry.date}</td>
                                  <td><a href="${entry.url}">View Report</a></td>
                              `;
                              tbody.appendChild(row);
                          });
                      })
                      .catch(error => {
                          console.error('Error loading history:', error);
                          document.getElementById('history-body').innerHTML =
                              '<tr><td colspan="3">Error loading history.</td></tr>';
                      });
              </script>
          </body>
          </html>
          EOF

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages-deploy
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update benchmarks for ${{ steps.metrics.outputs.version }}" || echo "No changes to commit"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages:gh-pages
