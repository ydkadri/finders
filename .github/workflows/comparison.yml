name: Comparison Benchmarks

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags
  workflow_dispatch:  # Allow manual triggering

jobs:
  benchmark:
    name: Run Comparison Benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-bench-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Install ripgrep
        run: |
          curl -LO https://github.com/BurntSushi/ripgrep/releases/download/14.1.1/ripgrep_14.1.1-1_amd64.deb
          sudo dpkg -i ripgrep_14.1.1-1_amd64.deb
          rg --version

      - name: Build finder in release mode
        run: cargo build --release

      - name: Run comparison benchmarks
        run: cargo bench --bench comparison_benchmarks

      - name: Extract benchmark metrics
        id: metrics
        run: |
          # Extract version from tag or use "dev" for manual runs
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="dev-$(date +%Y%m%d-%H%M%S)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

          # Parse Criterion JSON output and create summary
          cat > parse_benchmarks.py << 'PYTHON_EOF'
          import json
          import os
          from pathlib import Path

          # Scenarios and their sizes
          scenarios = [
              ("small_common", "Small (~100 files)", "common"),
              ("small_rare", "Small (~100 files)", "rare"),
              ("medium_common", "Medium (~1K files)", "common"),
              ("medium_rare", "Medium (~1K files)", "rare"),
              ("large_common", "Large (~5K files)", "common"),
              ("large_rare", "Large (~5K files)", "rare"),
          ]

          results = []
          criterion_base = Path("target/criterion")

          for scenario_name, size_label, pattern_type in scenarios:
              row = {
                  "scenario": scenario_name,
                  "size": size_label,
                  "pattern": pattern_type,
              }

              # Extract metrics for each tool
              for tool in ["finder", "find_grep", "ripgrep"]:
                  estimates_file = criterion_base / scenario_name / tool / pattern_type / "base" / "estimates.json"

                  if estimates_file.exists():
                      with open(estimates_file) as f:
                          data = json.load(f)
                          # Convert nanoseconds to milliseconds
                          mean_ns = data["mean"]["point_estimate"]
                          mean_ms = round(mean_ns / 1_000_000, 0)
                          row[tool] = int(mean_ms)
                  else:
                      row[tool] = None

              results.append(row)

          # Output as JSON
          print(json.dumps(results, indent=2))
          PYTHON_EOF

          python3 parse_benchmarks.py > benchmark_results.json
          cat benchmark_results.json

          echo "Benchmark parsing complete"

      - name: Upload benchmark data to gist
        env:
          GIST_ID: 5616380737bada94e84764d02b816b38
          GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          # Add metadata to JSON
          DATE="${{ steps.metrics.outputs.date }}"
          VERSION="${{ steps.metrics.outputs.version }}"

          jq --arg date "$DATE" --arg version "$VERSION" \
            '{date: $date, version: $version, results: .}' \
            benchmark_results.json > benchmark_data.json

          # Update gist
          curl -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/gists/$GIST_ID" \
            -d @- << EOF
          {
            "files": {
              "finders-benchmarks.json": {
                "content": $(cat benchmark_data.json | jq -Rs .)
              }
            }
          }
          EOF

      - name: Create branch for README update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch main and create new branch
          git fetch origin main
          BRANCH_NAME="benchmarks/update-${{ steps.metrics.outputs.version }}"
          git checkout -b "$BRANCH_NAME" origin/main
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Update README with benchmark table
        run: |
          # Generate the new table
          python3 << 'PYTHON_EOF' > new_table.md
          import json

          # Read benchmark results
          with open('benchmark_results.json', 'r') as f:
              data = json.load(f)

          # Group by size and pattern
          table_rows = {}
          for item in data:
              key = (item["pattern"], item["size"])
              if key not in table_rows:
                  table_rows[key] = item

          # Generate markdown table
          print("### Performance Summary (as of ${{ steps.metrics.outputs.date }})")
          print()
          print("| Scenario | Repository Size | finder | find+grep | ripgrep |")
          print("|----------|----------------|--------|-----------|---------|")

          # Order: common patterns first, then rare
          for pattern in ["common", "rare"]:
              for size in ["Small (~100 files)", "Medium (~1K files)", "Large (~5K files)"]:
                  key = (pattern, size)
                  if key in table_rows:
                      row = table_rows[key]
                      pattern_label = "Common pattern" if pattern == "common" else "Rare pattern"
                      finder_val = f"{row['finder']}ms" if row['finder'] else "N/A"
                      grep_val = f"{row['find_grep']}ms" if row['find_grep'] else "N/A"
                      rg_val = f"{row['ripgrep']}ms" if row['ripgrep'] else "N/A"
                      print(f"| {pattern_label} | {size} | {finder_val} | {grep_val} | {rg_val} |")
          PYTHON_EOF

          # Replace the table in README.md
          # Find the section between "### Performance Summary" and the next "###" or end
          python3 << 'PYTHON_EOF'
          import re

          # Read README
          with open('README.md', 'r') as f:
              readme = f.read()

          # Read new table
          with open('new_table.md', 'r') as f:
              new_table = f.read()

          # Pattern to match the performance summary section
          # Match from "### Performance Summary" to the next section or comparison benchmarks text
          pattern = r'### Performance Summary \(as of [0-9-]+\)\n\n\| Scenario.*?\n(?=\n(?:Comparison benchmarks|###|\Z))'

          # Replace with new table
          updated_readme = re.sub(pattern, new_table, readme, flags=re.DOTALL)

          # Write back
          with open('README.md', 'w') as f:
              f.write(updated_readme)

          print("✅ README.md updated with new benchmark data")
          PYTHON_EOF

      - name: Commit and push README changes
        run: |
          git add README.md

          if git diff --staged --quiet; then
            echo "No changes to README.md"
            echo "skip_pr=true" >> $GITHUB_ENV
          else
            git commit -m "Update benchmark results for ${{ steps.metrics.outputs.version }}"
            git push origin "${{ env.branch_name }}"
            echo "✅ README.md updated and pushed to ${{ env.branch_name }}"
            echo "skip_pr=false" >> $GITHUB_ENV
          fi

      - name: Create Pull Request
        if: env.skip_pr == 'false'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "${{ env.branch_name }}" \
            --title "Update benchmark results for ${{ steps.metrics.outputs.version }}" \
            --body "$(cat <<'EOF'
          ## Automated Benchmark Update

          This PR updates the performance summary table in README.md with the latest benchmark results.

          **Version:** ${{ steps.metrics.outputs.version }}
          **Date:** ${{ steps.metrics.outputs.date }}

          ### Changes
          - Updated Performance Summary table with fresh benchmark data
          - Data also uploaded to [gist](https://gist.github.com/ydkadri/5616380737bada94e84764d02b816b38)

          ### How to review
          1. Check that the table format looks correct
          2. Verify the numbers seem reasonable compared to previous results
          3. Merge when ready

          🤖 Generated automatically by comparison benchmarks workflow
          EOF
          )"

          echo "✅ Pull request created for benchmark updates"

      - name: Setup gh-pages deployment directory
        run: |
          # Clone existing gh-pages branch to preserve docs and other content
          rm -rf gh-pages-deploy

          git clone --branch gh-pages --single-branch \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            gh-pages-deploy 2>/dev/null || {
            # Branch doesn't exist yet, create empty directory
            mkdir -p gh-pages-deploy
            cd gh-pages-deploy
            git init
            git checkout -b gh-pages
            git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          }

          cd gh-pages-deploy
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update benchmark history
        run: |
          cd gh-pages-deploy
          mkdir -p benchmarks

          # Create history.json if it doesn't exist
          if [ ! -f benchmarks/history.json ]; then
            echo "[]" > benchmarks/history.json
          fi

          # Append new entry to history
          VERSION="${{ steps.metrics.outputs.version }}"
          DATE="${{ steps.metrics.outputs.date }}"
          TIMESTAMP="${{ steps.metrics.outputs.timestamp }}"

          # Read existing history, append new entry, write back
          jq --arg ver "$VERSION" --arg date "$DATE" --arg ts "$TIMESTAMP" \
            '. += [{version: $ver, date: $date, timestamp: $ts, url: "./latest/report/index.html"}]' \
            benchmarks/history.json > benchmarks/history_tmp.json
          mv benchmarks/history_tmp.json benchmarks/history.json

      - name: Copy Criterion HTML reports
        run: |
          # Remove old benchmarks/latest/ directory
          rm -rf gh-pages-deploy/benchmarks/latest

          # Copy new Criterion HTML output
          mkdir -p gh-pages-deploy/benchmarks/latest
          cp -r target/criterion/* gh-pages-deploy/benchmarks/latest/ || echo "No criterion output found"

      - name: Generate index page
        run: |
          cd gh-pages-deploy/benchmarks

          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>FindeRS Comparison Benchmarks</title>
              <style>
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
                      max-width: 1200px;
                      margin: 0 auto;
                      padding: 2rem;
                      line-height: 1.6;
                      color: #333;
                  }
                  h1 {
                      border-bottom: 3px solid #0066cc;
                      padding-bottom: 0.5rem;
                  }
                  h2 {
                      margin-top: 2rem;
                      color: #0066cc;
                  }
                  table {
                      width: 100%;
                      border-collapse: collapse;
                      margin: 1rem 0;
                  }
                  th, td {
                      padding: 0.75rem;
                      text-align: left;
                      border-bottom: 1px solid #ddd;
                  }
                  th {
                      background-color: #f5f5f5;
                      font-weight: 600;
                  }
                  tr:hover {
                      background-color: #f9f9f9;
                  }
                  a {
                      color: #0066cc;
                      text-decoration: none;
                  }
                  a:hover {
                      text-decoration: underline;
                  }
                  .latest {
                      background-color: #e6f2ff;
                      padding: 1rem;
                      border-radius: 4px;
                      margin: 1rem 0;
                  }
                  code {
                      background-color: #f5f5f5;
                      padding: 0.2rem 0.4rem;
                      border-radius: 3px;
                      font-family: "Courier New", monospace;
                  }
                  .footer {
                      margin-top: 3rem;
                      padding-top: 1rem;
                      border-top: 1px solid #ddd;
                      color: #666;
                      font-size: 0.9rem;
                  }
              </style>
          </head>
          <body>
              <h1>🔍 FindeRS Comparison Benchmarks</h1>

              <p>
                  Performance comparisons of <code>finder</code> against <code>find+grep</code>
                  and <code>ripgrep</code> across different repository sizes and search patterns.
              </p>

              <div class="latest">
                  <h2>Latest Results</h2>
                  <p><a href="./latest/report/index.html">View detailed Criterion benchmark reports →</a></p>
              </div>

              <h2>Benchmark History</h2>
              <table id="history-table">
                  <thead>
                      <tr>
                          <th>Version</th>
                          <th>Date</th>
                          <th>Results</th>
                      </tr>
                  </thead>
                  <tbody id="history-body">
                      <tr><td colspan="3">Loading...</td></tr>
                  </tbody>
              </table>

              <h2>About These Benchmarks</h2>
              <p>
                  Benchmarks test 6 scenarios: 3 repository sizes (small ~100 files, medium ~1K files,
                  large ~10K files) × 2 search patterns (common pattern found in ~50% of files,
                  rare pattern in 1 file).
              </p>
              <p>
                  All tools search for patterns in <code>*.rs</code> files using equivalent commands:
              </p>
              <ul>
                  <li><code>find</code> + <code>grep</code>: Traditional Unix pipeline</li>
                  <li><code>ripgrep</code>: Modern fast searcher</li>
                  <li><code>finder</code>: This project's implementation</li>
              </ul>

              <div class="footer">
                  <p>Generated automatically on benchmark runs. <a href="https://github.com/ydkadri/finders">View repository →</a></p>
              </div>

              <script>
                  // Load and display history
                  fetch('history.json')
                      .then(response => response.json())
                      .then(data => {
                          const tbody = document.getElementById('history-body');
                          tbody.innerHTML = '';

                          // Sort by timestamp descending (most recent first)
                          data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

                          if (data.length === 0) {
                              tbody.innerHTML = '<tr><td colspan="3">No benchmark history yet.</td></tr>';
                              return;
                          }

                          data.forEach(entry => {
                              const row = document.createElement('tr');
                              row.innerHTML = `
                                  <td><code>${entry.version}</code></td>
                                  <td>${entry.date}</td>
                                  <td><a href="${entry.url}">View Report</a></td>
                              `;
                              tbody.appendChild(row);
                          });
                      })
                      .catch(error => {
                          console.error('Error loading history:', error);
                          document.getElementById('history-body').innerHTML =
                              '<tr><td colspan="3">Error loading history.</td></tr>';
                      });
              </script>
          </body>
          </html>
          EOF

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages-deploy
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update benchmarks for ${{ steps.metrics.outputs.version }}" || echo "No changes to commit"
          git push --force-with-lease "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages:gh-pages
