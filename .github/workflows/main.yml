name: Main Branch

on:
  push:
    branches: [main]
  schedule:
    # Run weekly security audit on Monday at midnight UTC
    - cron: '0 0 * * 1'

permissions:
  contents: write

jobs:
  coverage-badge:
    name: Update Coverage Badge
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov

      - name: Run tests and generate coverage
        run: |
          cargo llvm-cov --all-features --workspace --json --output-path coverage.json > test-output.txt 2>&1 || true
          cargo test --all-features 2>&1 | tee -a test-output.txt || true

      - name: Extract test count and coverage
        id: metrics
        run: |
          # Extract test count (e.g., "test result: ok. 45 passed")
          TEST_COUNT=$(grep -oP '\d+(?= passed)' test-output.txt | head -1 || echo "0")
          echo "test_count=$TEST_COUNT" >> $GITHUB_OUTPUT
          echo "Tests: $TEST_COUNT passing"

          # Extract coverage percentage from JSON and round to nearest integer
          COVERAGE_RAW=$(jq -r '.data[0].totals.lines.percent' coverage.json)
          COVERAGE=$(printf "%.0f" "$COVERAGE_RAW")
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "Coverage: $COVERAGE%"

      - name: Determine coverage badge color
        id: color
        run: |
          COVERAGE=${{ steps.metrics.outputs.coverage }}
          if (( $(echo "$COVERAGE >= 90" | bc -l) )); then
            COLOR="brightgreen"
          elif (( $(echo "$COVERAGE >= 75" | bc -l) )); then
            COLOR="green"
          elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then
            COLOR="yellow"
          elif (( $(echo "$COVERAGE >= 40" | bc -l) )); then
            COLOR="orange"
          else
            COLOR="red"
          fi
          echo "color=$COLOR" >> $GITHUB_OUTPUT
          echo "Coverage badge color: $COLOR"

      - name: Update gist with badges
        env:
          GIST_ID: 5616380737bada94e84764d02b816b38
          GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          # Create test badge JSON
          cat > tests.json << EOF
          {
            "schemaVersion": 1,
            "label": "tests",
            "message": "${{ steps.metrics.outputs.test_count }} passing",
            "color": "success"
          }
          EOF

          # Create coverage badge JSON
          cat > coverage.json << EOF
          {
            "schemaVersion": 1,
            "label": "coverage",
            "message": "${{ steps.metrics.outputs.coverage }}%",
            "color": "${{ steps.color.outputs.color }}"
          }
          EOF

          # Update both gist files
          curl -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/gists/$GIST_ID" \
            -d @- << EOF
          {
            "files": {
              "finders-tests.json": {
                "content": $(cat tests.json | jq -Rs .)
              },
              "finders-coverage.json": {
                "content": $(cat coverage.json | jq -Rs .)
              }
            }
          }
          EOF

  auto-tag:
    name: Auto-Tag on Version Bump
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get current version
        id: version
        run: |
          # Get current version from Cargo.toml
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Check if tag exists
        id: tag-check
        run: |
          TAG_NAME="v${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG_NAME$"; then
            echo "Tag $TAG_NAME already exists - skipping"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Tag $TAG_NAME does not exist - will create"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.tag-check.outputs.exists == 'false'
        id: create-tag
        run: |
          TAG_NAME="v${{ steps.version.outputs.version }}"
          echo "Creating tag $TAG_NAME"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$TAG_NAME" -m "Release $TAG_NAME"

          # Push using Actions token to trigger release workflow
          # Using ACTIONS_TOKEN instead of GITHUB_TOKEN to trigger downstream workflows
          git push https://x-access-token:${{ secrets.ACTIONS_TOKEN }}@github.com/${{ github.repository }}.git "$TAG_NAME"

          echo "✅ Created and pushed tag $TAG_NAME"
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Trigger release workflow
        if: steps.tag-check.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ACTIONS_TOKEN }}
          script: |
            // Trigger the release workflow manually as a fallback
            // PATs from the same account don't always trigger workflows on tag push
            const tag = '${{ steps.create-tag.outputs.tag }}';
            console.log(`Triggering release workflow for ${tag}`);

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release.yml',
              ref: 'main',
              inputs: {
                tag: tag
              }
            });

            console.log(`✅ Release workflow triggered for ${tag}`);

      - name: Log result
        if: always()
        run: |
          echo "Auto-tag result:"
          echo "  Version: ${{ steps.version.outputs.version }}"
          echo "  Tag exists: ${{ steps.tag-check.outputs.exists }}"
          echo "  Tag created: ${{ steps.create-tag.outputs.tag || 'N/A' }}"

  security-scheduled:
    name: Security Audit (Scheduled)
    runs-on: ubuntu-latest
    # Only run on schedule, not on every push
    if: github.event_name == 'schedule'
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Security audit failed - vulnerabilities detected (${date})`,
              body: `The weekly security audit found vulnerabilities in dependencies.

            **Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}

            Please review the workflow logs and update vulnerable dependencies.`,
              labels: ['security', 'automated']
            })
