name: Main Branch

on:
  push:
    branches: [main]
  schedule:
    # Run weekly security audit on Monday at midnight UTC
    - cron: '0 0 * * 1'

permissions:
  contents: write

jobs:
  coverage-badge:
    name: Update Coverage Badge
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests and generate coverage
        id: metrics
        run: |
          # Use justfile command which has correct flags (--test-threads=1)
          just coverage-check 2>&1 | tee coverage-output.txt

          # Extract test count from output
          TEST_COUNT=$(grep -oP '\d+(?= passed)' coverage-output.txt | head -1 || echo "0")
          echo "test_count=$TEST_COUNT" >> $GITHUB_OUTPUT

          # Extract coverage from output (justfile already prints it)
          COVERAGE=$(grep -oP 'Coverage: \K[\d.]+(?=%)' coverage-output.txt | head -1)
          COVERAGE_INT=$(printf "%.0f" "$COVERAGE")
          echo "coverage=$COVERAGE_INT" >> $GITHUB_OUTPUT

          echo "Tests: $TEST_COUNT passing"
          echo "Coverage: $COVERAGE_INT%"

      - name: Determine coverage badge color
        id: color
        run: |
          COVERAGE=${{ steps.metrics.outputs.coverage }}
          if (( $(echo "$COVERAGE >= 90" | bc -l) )); then
            COLOR="brightgreen"
          elif (( $(echo "$COVERAGE >= 75" | bc -l) )); then
            COLOR="green"
          elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then
            COLOR="yellow"
          elif (( $(echo "$COVERAGE >= 40" | bc -l) )); then
            COLOR="orange"
          else
            COLOR="red"
          fi
          echo "color=$COLOR" >> $GITHUB_OUTPUT
          echo "Coverage badge color: $COLOR"

      - name: Update gist with badges
        env:
          GIST_ID: 5616380737bada94e84764d02b816b38
          GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          # Create test badge JSON
          cat > tests.json << EOF
          {
            "schemaVersion": 1,
            "label": "tests",
            "message": "${{ steps.metrics.outputs.test_count }} passing",
            "color": "success"
          }
          EOF

          # Create coverage badge JSON
          cat > coverage.json << EOF
          {
            "schemaVersion": 1,
            "label": "coverage",
            "message": "${{ steps.metrics.outputs.coverage }}%",
            "color": "${{ steps.color.outputs.color }}"
          }
          EOF

          # Update both gist files
          curl -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/gists/$GIST_ID" \
            -d @- << EOF
          {
            "files": {
              "finders-tests.json": {
                "content": $(cat tests.json | jq -Rs .)
              },
              "finders-coverage.json": {
                "content": $(cat coverage.json | jq -Rs .)
              }
            }
          }
          EOF

  security-scheduled:
    name: Security Audit (Scheduled)
    runs-on: ubuntu-latest
    # Only run on schedule, not on every push
    if: github.event_name == 'schedule'
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Security audit failed - vulnerabilities detected (${date})`,
              body: `The weekly security audit found vulnerabilities in dependencies.

            **Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}

            Please review the workflow logs and update vulnerable dependencies.`,
              labels: ['security', 'automated']
            })
